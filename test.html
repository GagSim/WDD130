<style>
.container {
  display: grid;
  grid-template-columns: auto auto auto;
  background-color: blue;
  padding: 10px;
}

.container > div {
  background-color: #f1f1f1;
  border: 1px solid black;
  padding: 20px;
  font-size: 30px;
  text-align: center;
}
</style>
</head>
<body>

<h1>display: grid</h1>

<p>Use display: grid; to make a block-level grid container:</p>
<img src="personal/images/beautifulpicture.jpg" alt="Random stuff for random people" height="50%" width="50%">

  <div>1</div>
  <div>2</div>
  <div>3</div>
